<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Input Pad - Serverless WebRTC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: #fff;
    color: #111;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    cursor: default;
    user-select: none;
  }

  #input-area {
    flex: 1;
    overflow: hidden;
    padding: 16px 16px 8px 16px;
    display: flex;
    flex-direction: column;
  }

  #output {
    font-size: 28px;
    letter-spacing: 0.12em;
    word-break: break-all;
    line-height: 1.5;
    color: #000;
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
    padding-bottom: 4px;
  }

  #output.empty { color: #c9c9c9; }

  #cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #000;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #conversions {
    font-size: 11px;
    color: #666;
    letter-spacing: 0.04em;
    padding: 6px 0 4px;
    border-top: 1px solid #e8e8e8;
    min-height: 22px;
  }

  #toolbar,
  .button-row {
    display: flex;
    border-top: 1px solid #ddd;
    background: #f8f8f8;
    gap: 0;
  }

  button {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-right: 1px solid #ddd;
    background: transparent;
    color: #333;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.12s ease;
  }

  button:last-child { border-right: none; }
  button:hover { background: #efefef; }
  button:active { background: #e0e0e0; }
  button:disabled {
    color: #aaa;
    cursor: not-allowed;
    background: #f8f8f8;
  }

  #hint {
    font-size: 10px;
    color: #999;
    padding: 4px 16px 8px;
    background: #f8f8f8;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    letter-spacing: 0.03em;
    border-top: 1px solid #eee;
  }

  #p2p {
    border-top: 1px solid #ddd;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #fcfcfc;
  }

  #p2p h3 {
    font-size: 14px;
    letter-spacing: 0.04em;
  }

  .label {
    font-size: 11px;
    color: #666;
    letter-spacing: 0.04em;
  }

  .inline-row {
    display: flex;
    gap: 8px;
  }

  .inline-row > * { flex: 1; }

  #p2p textarea,
  #p2p input {
    width: 100%;
    font-family: inherit;
    font-size: 12px;
    padding: 8px;
    border: 1px solid #d9d9d9;
    background: #fff;
    color: #111;
  }

  #p2p textarea {
    min-height: 92px;
    resize: vertical;
    user-select: text;
  }

  #p2p input {
    user-select: text;
  }

  #status {
    font-size: 12px;
    padding: 10px;
    border: 1px solid #e6e6e6;
    background: #fff;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  #instructions {
    font-size: 11px;
    color: #666;
    line-height: 1.6;
    border: 1px dashed #ddd;
    padding: 10px;
    background: #fff;
    user-select: text;
  }

  .pill {
    display: inline-block;
    border: 1px solid #ddd;
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 10px;
    color: #555;
    margin-right: 6px;
    background: #fafafa;
  }
</style>
</head>
<body>

<div id="input-area">
  <div id="output" class="empty"><span id="text-node"></span><span id="cursor"></span></div>
  <div id="conversions">dec: 0 &nbsp; hex: 0x0 &nbsp; bits: 0</div>
</div>

<div id="toolbar">
  <button id="btn-undo">戻す</button>
  <button id="btn-clear">消去</button>
  <button id="btn-copy">コピー</button>
</div>

<div id="hint">
  <span>左クリック → 1</span>
  <span>右クリック → 0</span>
  <span>接続中は入力が相手へ即時同期</span>
</div>

<div id="p2p">
  <h3>完全サーバーレス WebRTC / 接続コード交換</h3>

  <div class="inline-row">
    <div>
      <div class="label">自分のID</div>
      <input id="myID" placeholder="例: 10101101">
    </div>
    <div>
      <div class="label">相手のID</div>
      <input id="peerID" placeholder="例: 11001010">
    </div>
  </div>

  <div class="button-row">
    <button id="saveID">ID保存</button>
    <button id="makeOffer">接続コード生成（発信）</button>
    <button id="apply">相手コード適用</button>
    <button id="copyLocal">生成コードをコピー</button>
    <button id="resetConnection">接続リセット</button>
  </div>

  <div>
    <div class="label">自分が相手へ渡すコード</div>
    <textarea id="local" readonly placeholder="ここに offer / answer コードが生成されます"></textarea>
  </div>

  <div>
    <div class="label">相手から受け取ったコード</div>
    <textarea id="remote" placeholder="相手のコードをここへ貼り付けてから『相手コード適用』"></textarea>
  </div>

  <div id="status">未接続</div>

  <div id="instructions">
    <span class="pill">手順 1</span> 発信側が「相手のID」を入れて「接続コード生成（発信）」<br>
    <span class="pill">手順 2</span> 生成コードを相手へ送る<br>
    <span class="pill">手順 3</span> 受信側がそのコードを貼り付けて「相手コード適用」<br>
    <span class="pill">手順 4</span> 受信側に生成された返答コードを、発信側が貼り付けて「相手コード適用」<br>
    <span class="pill">完了</span> 接続成功後は 0/1 入力・戻す・消去 が双方同期されます
  </div>
</div>

<script>
(() => {
  'use strict';

  // ── DOM ───────────────────────────────────────
  const output = document.getElementById('output');
  const textNode = document.getElementById('text-node');
  const conversions = document.getElementById('conversions');
  const inputArea = document.getElementById('input-area');
  const myIDBox = document.getElementById('myID');
  const peerIDInput = document.getElementById('peerID');
  const localBox = document.getElementById('local');
  const remoteBox = document.getElementById('remote');
  const statusBox = document.getElementById('status');
  const saveIDBtn = document.getElementById('saveID');
  const makeOfferBtn = document.getElementById('makeOffer');
  const applyBtn = document.getElementById('apply');
  const copyLocalBtn = document.getElementById('copyLocal');
  const resetConnectionBtn = document.getElementById('resetConnection');
  const undoBtn = document.getElementById('btn-undo');
  const clearBtn = document.getElementById('btn-clear');
  const copyBtn = document.getElementById('btn-copy');

  // ── 状態 ───────────────────────────────────────
  let bits = [];
  let peer = null;
  let channel = null;
  let role = null; // 'offerer' | 'answerer'

  const STORAGE_KEY_ID = 'binaryPad.myId';
  const STORAGE_KEY_BITS = 'binaryPad.bits';
  const APP_TAG = 'binary-pad-webrtc';
  const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

  // ── 初期化 ─────────────────────────────────────
  initializeIds();
  restoreBits();
  render();
  updateStatus('未接続');

  peerIDInput.addEventListener('input', sanitizeBinaryInput);
  myIDBox.addEventListener('input', sanitizeBinaryInput);

  inputArea.addEventListener('click', () => appendBit(1));
  inputArea.addEventListener('contextmenu', (event) => {
    event.preventDefault();
    appendBit(0);
  });

  undoBtn.addEventListener('click', (event) => {
    event.stopPropagation();
    if (!bits.length) return;
    bits.pop();
    saveBits();
    render();
    broadcastState();
  });

  clearBtn.addEventListener('click', (event) => {
    event.stopPropagation();
    bits = [];
    saveBits();
    render();
    broadcastState();
  });

  copyBtn.addEventListener('click', async (event) => {
    event.stopPropagation();
    if (!bits.length) return;
    await copyText(bits.join(''), copyBtn, '✓ コピー済み');
  });

  saveIDBtn.addEventListener('click', () => {
    const value = normalizeBinaryId(myIDBox.value);
    if (!value) {
      alert('自分のIDは 0 と 1 のみで入力してください');
      return;
    }
    myIDBox.value = value;
    localStorage.setItem(STORAGE_KEY_ID, value);
    updateStatus('自分のIDを保存しました');
  });

  makeOfferBtn.addEventListener('click', async () => {
    try {
      const myId = ensureMyId();
      const peerId = normalizeBinaryId(peerIDInput.value);
      if (!peerId) {
        alert('相手のIDを入力してください');
        return;
      }
      role = 'offerer';
      resetPeerOnly();
      const pc = createPeer();
      channel = pc.createDataChannel('binary-pad');
      attachChannel(channel);
      updateStatus('接続コードを生成中…');

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitForIceGatheringComplete(pc);

      localBox.value = encodeSignal({
        app: APP_TAG,
        version: 1,
        kind: 'offer',
        from: myId,
        to: peerId,
        description: pc.localDescription
      });

      updateStatus('offerコードを生成しました。相手へ送ってください。');
    } catch (error) {
      handleError('接続コード生成に失敗しました', error);
    }
  });

  applyBtn.addEventListener('click', async () => {
    try {
      const myId = ensureMyId();
      const incoming = decodeSignal(remoteBox.value);
      validateSignal(incoming);

      const incomingTo = normalizeBinaryId(incoming.to || '');
      const incomingFrom = normalizeBinaryId(incoming.from || '');

      if (incomingTo && incomingTo !== myId) {
        throw new Error('このコードは別のID宛てです');
      }

      if (incoming.kind === 'offer') {
        role = 'answerer';
        resetPeerOnly();
        const pc = createPeer();
        if (incomingFrom) peerIDInput.value = incomingFrom;

        updateStatus('offerを適用中…');
        await pc.setRemoteDescription(incoming.description);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitForIceGatheringComplete(pc);

        localBox.value = encodeSignal({
          app: APP_TAG,
          version: 1,
          kind: 'answer',
          from: myId,
          to: incomingFrom || '',
          description: pc.localDescription
        });

        updateStatus('offerを受信しました。answerコードを相手へ返してください。');
        return;
      }

      if (incoming.kind === 'answer') {
        if (!peer) {
          throw new Error('先に発信側で offer コードを生成してください');
        }
        if (peer.signalingState !== 'have-local-offer') {
          throw new Error('現在の状態では answer を適用できません');
        }

        updateStatus('answerを適用中…');
        await peer.setRemoteDescription(incoming.description);
        updateStatus('answerを適用しました。接続完了を待っています…');
        return;
      }

      throw new Error('未対応のコード種別です');
    } catch (error) {
      handleError('相手コード適用に失敗しました', error);
    }
  });

  copyLocalBtn.addEventListener('click', async () => {
    if (!localBox.value.trim()) {
      alert('まだ生成コードがありません');
      return;
    }
    await copyText(localBox.value, copyLocalBtn, '✓ コードコピー済み');
  });

  resetConnectionBtn.addEventListener('click', () => {
    resetPeerOnly();
    localBox.value = '';
    remoteBox.value = '';
    role = null;
    updateStatus('接続をリセットしました');
  });

  // ── ビット入力 ───────────────────────────────────
  function appendBit(value) {
    bits.push(value);
    saveBits();
    render();
    broadcastState();
  }

  function render() {
    const str = bits.join('');
    if (!str) {
      output.classList.add('empty');
      textNode.textContent = '';
      conversions.innerHTML = 'dec: 0 &nbsp; hex: 0x0 &nbsp; bits: 0';
      output.scrollTop = output.scrollHeight;
      return;
    }

    output.classList.remove('empty');
    textNode.textContent = str;
    output.scrollTop = output.scrollHeight;

    const decimal = toBigIntString(str, 10);
    const hexadecimal = '0x' + toBigIntString(str, 16).toUpperCase();
    conversions.innerHTML = `dec: ${formatLargeDecimal(decimal)} &nbsp; hex: ${hexadecimal} &nbsp; bits: ${bits.length}`;
  }

  function toBigIntString(binaryString, radix) {
    try {
      if (!binaryString) return '0';
      const value = BigInt('0b' + binaryString);
      return value.toString(radix);
    } catch {
      return '変換不可';
    }
  }

  function formatLargeDecimal(decimal) {
    if (!/^\d+$/.test(decimal)) return decimal;
    return decimal.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function saveBits() {
    localStorage.setItem(STORAGE_KEY_BITS, bits.join(''));
  }

  function restoreBits() {
    const saved = localStorage.getItem(STORAGE_KEY_BITS) || '';
    bits = /^[01]*$/.test(saved) ? saved.split('').map(Number) : [];
  }

  // ── WebRTC ──────────────────────────────────────
  function createPeer() {
    const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    peer = pc;

    pc.addEventListener('datachannel', (event) => {
      channel = event.channel;
      attachChannel(channel);
    });

    pc.addEventListener('connectionstatechange', () => {
      const state = pc.connectionState;
      if (state === 'connected') {
        updateStatus('接続成功。入力内容を同期できます。');
        broadcastState();
      } else if (state === 'connecting') {
        updateStatus('接続中…');
      } else if (state === 'disconnected') {
        updateStatus('一時切断');
      } else if (state === 'failed') {
        updateStatus('接続失敗。接続リセット後にコードを再生成してください。');
      } else if (state === 'closed') {
        updateStatus('接続終了');
      }
    });

    pc.addEventListener('iceconnectionstatechange', () => {
      if (pc.iceConnectionState === 'failed') {
        updateStatus('ICE接続失敗。NAT環境によっては接続できない場合があります。');
      }
    });

    return pc;
  }

  function attachChannel(dc) {
    dc.addEventListener('open', () => {
      updateStatus('データチャネル接続完了');
      broadcastState();
    });

    dc.addEventListener('message', (event) => {
      try {
        const message = JSON.parse(event.data);
        if (message.type === 'state' && typeof message.bits === 'string' && /^[01]*$/.test(message.bits)) {
          bits = message.bits.split('').filter(Boolean).map(Number);
          saveBits();
          render();
        }
      } catch (error) {
        console.warn('受信データの解析に失敗:', error);
      }
    });

    dc.addEventListener('close', () => {
      updateStatus('データチャネル切断');
    });

    dc.addEventListener('error', () => {
      updateStatus('データチャネルでエラーが発生しました');
    });
  }

  function broadcastState() {
    if (!channel || channel.readyState !== 'open') return;
    channel.send(JSON.stringify({ type: 'state', bits: bits.join('') }));
  }

  function waitForIceGatheringComplete(pc) {
    if (pc.iceGatheringState === 'complete') return Promise.resolve();

    return new Promise((resolve, reject) => {
      const timeoutId = setTimeout(() => {
        cleanup();
        reject(new Error('ICE候補の収集がタイムアウトしました'));
      }, 15000);

      const onStateChange = () => {
        if (pc.iceGatheringState === 'complete') {
          cleanup();
          resolve();
        }
      };

      const cleanup = () => {
        clearTimeout(timeoutId);
        pc.removeEventListener('icegatheringstatechange', onStateChange);
      };

      pc.addEventListener('icegatheringstatechange', onStateChange);
    });
  }

  function resetPeerOnly() {
    try {
      if (channel) {
        channel.onopen = null;
        channel.onmessage = null;
        channel.onclose = null;
        channel.onerror = null;
        if (channel.readyState !== 'closed') channel.close();
      }
    } catch {}

    try {
      if (peer && peer.signalingState !== 'closed') peer.close();
    } catch {}

    peer = null;
    channel = null;
  }

  // ── シグナリングコード ───────────────────────────
  function encodeSignal(payload) {
    const json = JSON.stringify(payload);
    const bytes = new TextEncoder().encode(json);
    let binary = '';
    for (const byte of bytes) binary += String.fromCharCode(byte);
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  }

  function decodeSignal(text) {
    const compact = String(text || '').trim().replace(/\s+/g, '');
    if (!compact) throw new Error('相手コードが空です');

    const normalized = compact.replace(/-/g, '+').replace(/_/g, '/');
    const padding = '='.repeat((4 - (normalized.length % 4 || 4)) % 4);
    const binary = atob(normalized + padding);
    const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  }

  function validateSignal(signal) {
    if (!signal || typeof signal !== 'object') throw new Error('コード形式が不正です');
    if (signal.app !== APP_TAG) throw new Error('このアプリ用のコードではありません');
    if (![1].includes(signal.version)) throw new Error('未対応のコードバージョンです');
    if (!['offer', 'answer'].includes(signal.kind)) throw new Error('コード種別が不正です');
    if (!signal.description || !signal.description.type || !signal.description.sdp) {
      throw new Error('SDP情報が不足しています');
    }
  }

  // ── 共通ユーティリティ ───────────────────────────
  function sanitizeBinaryInput(event) {
    event.target.value = normalizeBinaryId(event.target.value);
  }

  function normalizeBinaryId(value) {
    return String(value || '').replace(/[^01]/g, '');
  }

  function initializeIds() {
    const savedId = normalizeBinaryId(localStorage.getItem(STORAGE_KEY_ID) || '');
    if (savedId) {
      myIDBox.value = savedId;
      return;
    }

    const randomBinaryId = BigInt('0x' + crypto.randomUUID().replace(/-/g, '').slice(0, 12)).toString(2);
    myIDBox.value = randomBinaryId;
  }

  function ensureMyId() {
    const myId = normalizeBinaryId(myIDBox.value);
    if (!myId) {
      throw new Error('自分のIDを設定してください');
    }
    myIDBox.value = myId;
    localStorage.setItem(STORAGE_KEY_ID, myId);
    return myId;
  }

  function updateStatus(message) {
    const state = peer ? [
      `role: ${role || '-'}`,
      `peer.connectionState: ${peer.connectionState}`,
      `peer.iceConnectionState: ${peer.iceConnectionState}`,
      `channel: ${channel ? channel.readyState : '-'}`
    ].join(' | ') : 'role: - | peer.connectionState: - | peer.iceConnectionState: - | channel: -';

    statusBox.textContent = `${message}\n${state}`;
  }

  async function copyText(text, button, successLabel) {
    try {
      await navigator.clipboard.writeText(text);
      const original = button.textContent;
      button.textContent = successLabel;
      setTimeout(() => { button.textContent = original; }, 1200);
    } catch {
      alert('コピーに失敗しました。HTTPS または localhost で開いているか確認してください。');
    }
  }

  function handleError(prefix, error) {
    console.error(prefix, error);
    const message = error instanceof Error ? error.message : String(error);
    updateStatus(`${prefix}\n${message}`);
    alert(`${prefix}\n${message}`);
  }
})();
</script>
