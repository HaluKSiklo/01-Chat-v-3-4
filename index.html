<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Input Pad - Auto-Connect WebRTC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #fff;
    color: #111;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    cursor: pointer;
    user-select: none;
  }

  /* ── 画面分割エリア ────────────────────────── */
  #split-container {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 16px;
    gap: 16px;
  }
  @media (max-width: 600px) { #split-container { flex-direction: column; } }

  .pad-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid #eee;
    border-radius: 4px;
    padding: 12px;
    background: #fafafa;
    overflow: hidden;
  }
  #my-pane { background: #fff; border-color: #ddd; }
  .pane-title { font-size: 11px; color: #888; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.05em; }
  #my-pane .pane-title { color: #111; }

  .output {
    font-size: 24px;
    letter-spacing: 0.12em;
    word-break: break-all;
    line-height: 1.5;
    color: #000;
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
    padding-bottom: 4px;
  }
  .output.empty { color: #c9c9c9; }

  .fake-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #000;
    vertical-align: text-bottom;
    margin-left: 1px;
    margin-right: 1px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .conversions {
    font-size: 11px;
    color: #666;
    letter-spacing: 0.04em;
    padding-top: 6px;
    border-top: 1px solid #e8e8e8;
    min-height: 22px;
  }

  /* ── ツールバー ───────────────────────────── */
  #toolbar {
    display: flex;
    align-items: center;
    border-top: 1px solid #ddd;
    background: #f8f8f8;
    gap: 0;
    flex-wrap: wrap;
  }
  #toolbar button {
    flex: 1;
    padding: 12px;
    border: none;
    border-right: 1px solid #ddd;
    background: transparent;
    color: #333;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.12s ease;
    min-width: 90px;
  }
  #toolbar button:hover:not(:disabled) { background: #efefef; }
  #toolbar button:active:not(:disabled) { background: #e0e0e0; }
  #toolbar button:disabled { color: #bbb; background: #fdfdfd; cursor: not-allowed; }

  .setting-wrap {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: #555;
    gap: 6px;
    border-left: 1px solid #ddd;
    height: 41px;
    background: #f1f1f1;
    cursor: default;
  }
  .setting-wrap input[type="checkbox"] { cursor: pointer; }
  .setting-wrap input[type="number"] { width: 42px; padding: 2px 4px; font-family: inherit; font-size: 11px; border: 1px solid #ccc; text-align: center; cursor: text; }
  .setting-wrap select { font-family: inherit; font-size: 11px; padding: 2px; border: 1px solid #ccc; background: #fff; cursor: pointer; }

  #hint { font-size: 10px; color: #999; padding: 6px 16px; background: #f8f8f8; display: flex; flex-wrap: wrap; gap: 14px; letter-spacing: 0.03em; border-top: 1px solid #eee; }

  /* ── 自動P2P接続セクション ───────────────── */
  #p2p-section {
    border-top: 1px solid #ddd;
    background: #fcfcfc;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .label { font-size: 11px; color: #666; letter-spacing: 0.04em; }
  .inline-row { display: flex; gap: 8px; }
  .inline-row > * { flex: 1; }
  #p2p-section input {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    padding: 8px;
    border: 1px solid #ccc;
    background: #fff;
    color: #111;
    cursor: text;
  }
  #status {
    font-size: 11px;
    padding: 8px;
    border: 1px solid #e6e6e6;
    background: #fff;
    white-space: pre-wrap;
    line-height: 1.4;
    color: #444;
  }
</style>
</head>
<body>

<div id="split-container">
  <div id="my-pane" class="pad-pane">
    <div class="pane-title">【自分】の入力エリア</div>
    <div id="my-output" class="output empty"></div>
    <div id="my-conversions" class="conversions">dec: 0 &nbsp; hex: 0x0 &nbsp; bits: 0</div>
  </div>
  
  <div id="peer-pane" class="pad-pane">
    <div class="pane-title">【相手】の同期エリア</div>
    <div id="peer-output" class="output empty">（相手の入力待ち）</div>
    <div id="peer-conversions" class="conversions">dec: 0 &nbsp; hex: 0x0 &nbsp; bits: 0</div>
  </div>
</div>

<div id="toolbar">
  <button id="btn-backspace">削除 (BS)</button>
  <button id="btn-newline">改行 (Enter)</button>
  <button id="btn-clear">全消去</button>
  <button id="btn-copy">自分の入力をコピー</button>
  <button id="btn-copy-peer" disabled>相手の入力をコピー</button>
  
  <div class="setting-wrap" id="wrap-autowrap">
    <input type="checkbox" id="chk-autowrap">
    <input type="number" id="num-wrapcount" value="8" min="1" max="999">
    <label for="chk-autowrap" style="cursor:pointer;">文字で自動改行</label>
    <select id="sel-wrapcode">
      <option value="nl">通常の改行 (\n)</option>
      <option value="empty-line">空行を挿入 (\n\n)</option>
      <option value="space">半角スペース挿入 + \n</option>
      <option value="comma">カンマ[,]挿入 + \n</option>
    </select>
  </div>

  <div class="setting-wrap" id="wrap-confirm">
    <input type="checkbox" id="chk-confirm" checked>
    <label for="chk-confirm" style="cursor:pointer;">消去時に確認</label>
  </div>
</div>

<div id="hint">
  <span>【画面の空白どこでも】 左クリック → 1挿入 / 右クリック → 0挿入</span>
  <span>【キーボード】 0 や 1 キー → 数値挿入</span>
  <span>【カーソル移動】 ← → ↑ ↓ キー</span>
</div>

<div id="p2p-section">
  <div class="inline-row">
    <div>
      <div class="label">自分のID (0と1で指定)</div>
      <input id="myID" placeholder="例: 001">
    </div>
    <div>
      <div class="label">接続したい相手のID (0と1で指定)</div>
      <input id="peerID" placeholder="例: 010">
    </div>
  </div>
  <div id="status">IDを入力してください。お互いのIDがクロスで一致すると自動接続します。</div>
</div>

<script>
(() => {
  'use strict';

  // ── DOM エレメント ───────────────────────────
  const myOutput = document.getElementById('my-output');
  const myConversions = document.getElementById('my-conversions');
  const peerOutput = document.getElementById('peer-output');
  const peerConversions = document.getElementById('peer-conversions');

  const myIDBox = document.getElementById('myID');
  const peerIDInput = document.getElementById('peerID');
  const statusBox = document.getElementById('status');
  
  const backspaceBtn = document.getElementById('btn-backspace');
  const newlineBtn = document.getElementById('btn-newline');
  const clearBtn = document.getElementById('btn-clear');
  const copyBtn = document.getElementById('btn-copy');
  const copyPeerBtn = document.getElementById('btn-copy-peer');
  
  const chkConfirm = document.getElementById('chk-confirm');
  const wrapConfirm = document.getElementById('wrap-confirm');
  const chkAutowrap = document.getElementById('chk-autowrap');
  const numWrapcount = document.getElementById('num-wrapcount');
  const selWrapcode = document.getElementById('sel-wrapcode');
  const wrapAutowrap = document.getElementById('wrap-autowrap');

  // ── 状態管理 ─────────────────────────────────
  let myBits = [];
  let myCursorIdx = 0;
  let peerBits = [];

  let peer = null;
  let channel = null;
  let sseSource = null; // 自動中継用

  const STORAGE_KEY_MY_ID = 'binaryPad.myIdAuto';
  const STORAGE_KEY_PEER_ID = 'binaryPad.peerIdAuto';
  const STORAGE_KEY_BITS = 'binaryPad.myBits';
  const STORAGE_KEY_CONFIRM = 'binaryPad.needConfirm';
  const STORAGE_KEY_AUTOWRAP_ON = 'binaryPad.autoWrapOn';
  const STORAGE_KEY_AUTOWRAP_VAL = 'binaryPad.autoWrapVal';
  const STORAGE_KEY_AUTOWRAP_CODE = 'binaryPad.autoWrapCode';

  // 公開されている中継中継サービスを利用 (WebRTCシグナリング用)
  const SIGNALING_URL = 'https://broker.anywhere.co.id/signal'; 

  // ── 初期化 ───────────────────────────────────
  restoreBits();
  restoreSettings();
  renderMyPane();
  renderPeerPane();
  startSignalingListener(); // 自動接続待ち受け開始

  peerIDInput.addEventListener('input', (e) => { sanitizeBinaryInput(e); localStorage.setItem(STORAGE_KEY_PEER_ID, e.target.value); startSignalingListener(); });
  myIDBox.addEventListener('input', (e) => { sanitizeBinaryInput(e); localStorage.setItem(STORAGE_KEY_MY_ID, e.target.value); startSignalingListener(); });

  chkConfirm.addEventListener('change', () => localStorage.setItem(STORAGE_KEY_CONFIRM, chkConfirm.checked ? '1' : '0'));
  wrapConfirm.addEventListener('click', (e) => e.stopPropagation());
  chkAutowrap.addEventListener('change', () => localStorage.setItem(STORAGE_KEY_AUTOWRAP_ON, chkAutowrap.checked ? '1' : '0'));
  numWrapcount.addEventListener('input', () => {
    let val = parseInt(numWrapcount.value, 10);
    if (isNaN(val) || val < 1) val = 1;
    localStorage.setItem(STORAGE_KEY_AUTOWRAP_VAL, val.toString());
  });
  selWrapcode.addEventListener('change', () => localStorage.setItem(STORAGE_KEY_AUTOWRAP_CODE, selWrapcode.value));
  wrapAutowrap.addEventListener('click', (e) => e.stopPropagation());

  // ── キーボード・クリック処理 (既存維持) ──────
  window.addEventListener('keydown', (event) => {
    if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
    if (event.key === '0') { event.preventDefault(); insertBit(0); }
    else if (event.key === '1') { event.preventDefault(); insertBit(1); }
    else if (event.key === 'ArrowLeft') { event.preventDefault(); if (myCursorIdx > 0) { myCursorIdx--; renderMyPane(); } }
    else if (event.key === 'ArrowRight') { event.preventDefault(); if (myCursorIdx < myBits.length) { myCursorIdx++; renderMyPane(); } }
    else if (event.key === 'ArrowUp') { event.preventDefault(); moveVertical(-1); }
    else if (event.key === 'ArrowDown') { event.preventDefault(); moveVertical(1); }
    else if (event.key === 'Backspace') { event.preventDefault(); executeBackspace(); }
    else if (event.key === 'Delete') { event.preventDefault(); executeDelete(); }
    else if (event.key === 'Enter') { event.preventDefault(); insertBit('\n'); }
  });

  window.addEventListener('click', (event) => { if (isIgnoredElement(event.target)) return; insertBit(1); });
  window.addEventListener('contextmenu', (event) => { if (isIgnoredElement(event.target)) return; event.preventDefault(); insertBit(0); });
  function isIgnoredElement(target) { return target.tagName === 'BUTTON' || target.tagName === 'INPUT' || target.tagName === 'SELECT' || target.tagName === 'OPTION' || target.closest('.setting-wrap') !== null; }

  backspaceBtn.addEventListener('click', (e) => { e.stopPropagation(); executeBackspace(); });
  newlineBtn.addEventListener('click', (e) => { e.stopPropagation(); insertBit('\n'); });
  clearBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (chkConfirm.checked && !confirm('自分の入力をすべて消去しますか？')) return;
    myBits = []; myCursorIdx = 0; saveBits(); renderMyPane(); broadcastState();
  });
  copyBtn.addEventListener('click', async (e) => { e.stopPropagation(); if (myBits.length) await copyText(myBits.join(''), copyBtn, '✓ コピー済み'); });
  copyPeerBtn.addEventListener('click', async (e) => { e.stopPropagation(); if (peerBits.length) await copyText(peerBits.join(''), copyPeerBtn, '✓ 相手の入力をコピーした'); });

  // ── データロジック ──────────────────────────
  function insertBit(val) {
    myBits.splice(myCursorIdx, 0, val);
    myCursorIdx++;
    if ((val === 0 || val === 1) && chkAutowrap.checked) {
      const limit = parseInt(numWrapcount.value, 10) || 8;
      if (getCurrentLineLength() > limit) {
        myCursorIdx--;
        const mode = selWrapcode.value;
        if (mode === 'empty-line') { myBits.splice(myCursorIdx, 0, '\n', '\n'); myCursorIdx += 3; }
        else if (mode === 'space') { myBits.splice(myCursorIdx, 0, ' ', '\n'); myCursorIdx += 3; }
        else if (mode === 'comma') { myBits.splice(myCursorIdx, 0, ',', '\n'); myCursorIdx += 3; }
        else { myBits.splice(myCursorIdx, 0, '\n'); myCursorIdx += 2; }
      }
    }
    saveBits(); renderMyPane(); broadcastState();
  }

  function executeBackspace() { if (myCursorIdx === 0) return; myBits.splice(myCursorIdx - 1, 1); myCursorIdx--; saveBits(); renderMyPane(); broadcastState(); }
  function executeDelete() { if (myCursorIdx === myBits.length) return; myBits.splice(myCursorIdx, 1); saveBits(); renderMyPane(); broadcastState(); }
  function getCurrentLineLength() {
    let len = 0;
    for (let i = myCursorIdx - 1; i >= 0; i--) { if (myBits[i] === '\n') break; if (myBits[i] === 0 || myBits[i] === 1) len++; }
    for (let i = myCursorIdx; i < myBits.length; i++) { if (myBits[i] === '\n') break; if (myBits[i] === 0 || myBits[i] === 1) len++; }
    return len;
  }
  function moveVertical(direction) {
    const lines = myBits.join('').split('\n'); let accumulated = 0; let currentLineIdx = 0; let currentChIdx = 0;
    for (let i = 0; i < lines.length; i++) {
      const start = accumulated; const end = accumulated + lines[i].length;
      if (myCursorIdx >= start && myCursorIdx <= end) { currentLineIdx = i; currentChIdx = myCursorIdx - start; break; }
      accumulated += lines[i].length + 1;
    }
    const targetLineIdx = currentLineIdx + direction; if (targetLineIdx < 0 || targetLineIdx >= lines.length) return;
    let targetGlobalIdx = 0; for (let i = 0; i < targetLineIdx; i++) { targetGlobalIdx += lines[i].length + 1; }
    myCursorIdx = targetGlobalIdx + Math.min(currentChIdx, lines[targetLineIdx].length); renderMyPane();
  }

  // ── 描画 ─────────────────────────────────────
  function renderMyPane() {
    myOutput.innerHTML = '';
    if (myBits.length === 0) {
      myOutput.classList.add('empty'); const cursorSpan = document.createElement('span'); cursorSpan.className = 'fake-cursor'; myOutput.appendChild(cursorSpan);
    } else {
      myOutput.classList.remove('empty');
      myOutput.appendChild(document.createTextNode(myBits.slice(0, myCursorIdx).join('')));
      const cursorSpan = document.createElement('span'); cursorSpan.className = 'fake-cursor'; myOutput.appendChild(cursorSpan);
      myOutput.appendChild(document.createTextNode(myBits.slice(myCursorIdx).join('')));
    }
    updateConversions(myBits, myConversions); myOutput.scrollTop = myOutput.scrollHeight;
  }
  function renderPeerPane() {
    peerOutput.innerHTML = '';
    if (peerBits.length === 0) { peerOutput.classList.add('empty'); peerOutput.textContent = '（相手の入力待ち）'; copyPeerBtn.disabled = true; }
    else { peerOutput.classList.remove('empty'); peerOutput.textContent = peerBits.join(''); copyPeerBtn.disabled = false; }
    updateConversions(peerBits, peerConversions); peerOutput.scrollTop = peerOutput.scrollHeight;
  }
  function updateConversions(bitArray, convEl) {
    const pureBinary = bitArray.join('').replace(/[^01]/g, '');
    if (!pureBinary) { convEl.innerHTML = 'dec: 0 &nbsp; hex: 0x0 &nbsp; bits: 0'; return; }
    try {
      const val = BigInt('0b' + pureBinary);
      convEl.innerHTML = `dec: ${val.toString(10).replace(/\B(?=(\d{3})+(?!\d))/g, ',')} &nbsp; hex: 0x${val.toString(16).toUpperCase()} &nbsp; bits: ${pureBinary.length}`;
    } catch { convEl.innerHTML = '変換不可'; }
  }

  function saveBits() { localStorage.setItem(STORAGE_KEY_BITS, myBits.join('')); }
  function restoreBits() { const saved = localStorage.getItem(STORAGE_KEY_BITS) || ''; myBits = saved.split(''); if (myBits.length === 1 && myBits[0] === '') myBits = []; myCursorIdx = myBits.length; }
  function restoreSettings() {
    chkConfirm.checked = (localStorage.getItem(STORAGE_KEY_CONFIRM) !== '0');
    chkAutowrap.checked = (localStorage.getItem(STORAGE_KEY_AUTOWRAP_ON) === '1');
    numWrapcount.value = localStorage.getItem(STORAGE_KEY_AUTOWRAP_VAL) || '8';
    selWrapcode.value = localStorage.getItem(STORAGE_KEY_AUTOWRAP_CODE) || 'nl';
    myIDBox.value = localStorage.getItem(STORAGE_KEY_MY_ID) || '';
    peerIDInput.value = localStorage.getItem(STORAGE_KEY_PEER_ID) || '';
  }

  // ── 【重要】自動WebRTCシグナリング通信処理 ──────────────────
  let isConnecting = false;

  function updateStatus(msg) {
    const state = peer ? `[WebRTC: ${peer.connectionState}]` : '[未接続]';
    statusBox.textContent = `${msg} ${state}`;
  }

  // サーバーの特定チャンネルを監視する仕組み
  function startSignalingListener() {
    const myId = normalizeBinaryId(myIDBox.value);
    const peerId = normalizeBinaryId(peerIDInput.value);

    if (!myId || !peerId) {
      updateStatus('IDを入力してください。お互いが一致すると自動接続します。');
      return;
    }

    if (sseSource) sseSource.close();
    if (peer && peer.connectionState === 'connected') return;

    updateStatus(`自動接続待機中... (あなたのID: ${myId} -> 相手: ${peerId})`);

    // 簡易的なシグナリング中継（EventSourceを使用）
    // 相手が自分宛てに投げた「offer」や「answer」を自動検知する
    sseSource = new EventSource(`${SIGNALING_URL}/listen?room=${myId}`);
    sseSource.onmessage = async (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.from !== peerId) return; // 指定した相手以外からの通信は無視

        if (data.type === 'offer' && (!peer || peer.signalingState === 'stable')) {
          updateStatus('相手からの接続(Offer)を自動検知しました。応答中...');
          await handleIncomingOffer(data.sdp, myId, peerId);
        } else if (data.type === 'answer' && peer) {
          updateStatus('相手からの応答(Answer)を自動適用しました。接続完了を待っています...');
          await peer.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp }));
        }
      } catch (e) {
        console.error("シグナリング受信エラー", e);
      }
    };

    // 先に部屋に入った側（または能動的）にOfferを作らせるためのトリガー（3秒毎に確認）
    // 先行側が自動でOfferを出し、後行側がそれをキャッチして自動でAnswerを返す
    if (!isConnecting) {
      isConnecting = true;
      setTimeout(() => {
        if (!peer || peer.connectionState !== 'connected') {
          triggerAutoOffer(myId, peerId);
        }
        isConnecting = false;
      }, 2000);
    }
  }

  async function triggerAutoOffer(myId, peerId) {
    if (peer && peer.connectionState === 'connected') return;
    // IDの数値比較で、常に片方がOffer担当（offerer）、片方がAnswer担当になるよう役割競合を防ぐ
    if (BigInt('0b' + myId) > BigInt('0b' + peerId)) {
      return; // 自分の方がIDが大きい場合は相手からのOfferを待つ
    }

    try {
      updateStatus('接続を開始(Offerを送信)しています...');
      const pc = createPeerConnection(myId, peerId);
      channel = pc.createDataChannel('binary-pad-auto');
      attachChannel(channel);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // 相手の待受ルーム（相手のID名）へOfferを送信
      await sendSignal(peerId, { type: 'offer', from: myId, sdp: offer.sdp });
    } catch (err) {
      console.warn("Offer自動送信リトライ中...", err);
    }
  }

  async function handleIncomingOffer(sdp, myId, peerId) {
    try {
      const pc = createPeerConnection(myId, peerId);
      await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: sdp }));
      
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      // 相手の待受ルームへAnswerを送信
      await sendSignal(peerId, { type: 'answer', from: myId, sdp: answer.sdp });
    } catch (err) {
      console.error("Answer自動返信失敗", err);
    }
  }

  function createPeerConnection(myId, peerId) {
    if (peer) { try { peer.close(); } catch {} }
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    peer = pc;

    pc.onicecandidate = (e) => {
      // ICE候補が確定したら、最新のSDP（ローカル記述）を再送して接続率を高める
      if (!e.candidate && pc.localDescription) {
        sendSignal(peerId, { type: pc.localDescription.type, from: myId, sdp: pc.localDescription.sdp });
      }
    };

    pc.ondatachannel = (event) => {
      channel = event.channel;
      attachChannel(channel);
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') {
        updateStatus('接続成功！同期されています。');
        if (sseSource) { sseSource.close(); sseSource = null; } // 繋がったら中継サーバーとの接続は切断
        broadcastState();
      } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
        updateStatus('接続が切れました。再接続を試みます...');
        setTimeout(startSignalingListener, 3000);
      }
    };
    return pc;
  }

  function attachChannel(dc) {
    dc.onopen = () => { broadcastState(); };
    dc.onmessage = (event) => {
      try {
        const message = JSON.parse(event.data);
        if (message.type === 'state' && typeof message.bits === 'string') {
          peerBits = message.bits.split('');
          if (peerBits.length === 1 && peerBits[0] === '') peerBits = [];
          renderPeerPane();
        }
      } catch (error) { console.warn('解析エラー:', error); }
    };
  }

  function broadcastState() { if (channel && channel.readyState === 'open') channel.send(JSON.stringify({ type: 'state', bits: myBits.join('') })); }

  // サーバーへ接続信号を書き込む関数
  async function sendSignal(toRoom, payload) {
    try {
      await fetch(`${SIGNALING_URL}/send?room=${toRoom}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (e) { console.warn("シグナル送信失敗", e); }
  }

  function sanitizeBinaryInput(event) { event.target.value = normalizeBinaryId(event.target.value); }
  function normalizeBinaryId(value) { return String(value || '').replace(/[^01]/g, ''); }
  async function copyText(text, button, successLabel) { try { await navigator.clipboard.writeText(text); const orig = button.textContent; button.textContent = successLabel; setTimeout(() => button.textContent = orig, 1200); } catch { alert('コピー失敗'); } }
})();
</script>
</body>
